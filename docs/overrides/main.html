{% extends "base.html" %}

{% block header %}
<!-- KernelSight Unified Header (replaces Material header on KB pages) -->
<div class="ks-supernav">
  <div class="ks-supernav__inner">
    <!-- Mobile hamburger to toggle sidebar -->
    <label class="ks-supernav__hamburger md-header__button md-icon" for="__drawer">
      {% include ".icons/material/menu.svg" %}
    </label>
    <a href="{{ config.site_url }}" class="ks-supernav__logo">KernelSight</a>
    <nav class="ks-supernav__links">
      <a href="{{ config.site_url }}" class="ks-supernav__link">Dashboard</a>
      <a href="{{ config.site_url }}threat-matrix/" class="ks-supernav__link">Threat Matrix</a>
      <a href="{{ config.site_url }}cve-explorer/" class="ks-supernav__link">CVE Explorer</a>
      <a href="{{ config.site_url }}overview/" class="ks-supernav__link ks-supernav__link--active">Knowledge Base</a>
      <a href="{{ config.site_url }}about/" class="ks-supernav__link">About</a>
    </nav>
    <div class="ks-supernav__actions">
      <!-- Search trigger -->
      <label class="ks-supernav__action md-header__button md-icon" for="__search">
        {% include ".icons/material/magnify.svg" %}
      </label>
      <a href="https://github.com/splintersfury/KernelSight" class="ks-supernav__github" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </div>
  </div>
</div>
{% endblock %}

{% block extrahead %}
  <!-- OpenGraph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="KernelSight">
  {% if page %}
  <meta property="og:title" content="{{ page.title }} — KernelSight">
  <meta property="og:description" content="{{ page.meta.description | default(config.site_description, true) }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  {% else %}
  <meta property="og:title" content="KernelSight">
  <meta property="og:description" content="{{ config.site_description }}">
  {% endif %}
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  {% if page %}
  <meta name="twitter:title" content="{{ page.title }} — KernelSight">
  <meta name="twitter:description" content="{{ page.meta.description | default(config.site_description, true) }}">
  {% else %}
  <meta name="twitter:title" content="KernelSight">
  <meta name="twitter:description" content="{{ config.site_description }}">
  {% endif %}
  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "KernelSight",
    "url": "https://splintersfury.github.io/KernelSight/",
    "description": "{{ config.site_description }}",
    "author": {
      "@type": "Person",
      "name": "Ahmad Abdillah Bin Zaini"
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://splintersfury.github.io/KernelSight/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <script>
    (function() {
      var m = location.pathname.match(
        /\/(driver-types|attack-surfaces|vuln-classes|primitives|case-studies|mitigations|tooling|reference)\b/
      );
      var map = {
        'driver-types': 'drivers',
        'attack-surfaces': 'surfaces',
        'vuln-classes': 'vulns',
        'primitives': 'primitives',
        'case-studies': 'cases',
        'mitigations': 'mitigations',
        'tooling': 'tooling',
        'reference': 'tooling'
      };
      document.documentElement.setAttribute(
        'data-ks-section', m ? map[m[1]] : 'home'
      );
    })();
  </script>
{% endblock %}
